<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanning...</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #000; color: white; }
        #status { font-size: 24px; margin-top: 20px; }
        
        /* The styling for the new Stop Button */
        #stopBtn {
            display: none; /* Hidden until the video successfully starts */
            margin: 40px auto;
            padding: 15px 30px;
            font-size: 20px;
            background-color: #f44336; /* A nice red color */
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 80%;
        }
    </style>
</head>
<body>
    <h1 id="status">Connecting...</h1>
    
    <button id="stopBtn" onclick="stopVideo()">Stop Video</button>

    <script>
        // Your Firebase Config
        const firebaseConfig = {
          apiKey: "AIzaSyCktc_PacSOjTOdLZQPefzNJUF4HW-fOCM",
          authDomain: "memory-objects.firebaseapp.com",
          databaseURL: "https://memory-objects-default-rtdb.asia-southeast1.firebasedatabase.app",
          projectId: "memory-objects",
          storageBucket: "memory-objects.firebasestorage.app",
          messagingSenderId: "746130382440",
          appId: "1:746130382440:web:7927bbe13b9767c8ee65dd"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const urlParams = new URLSearchParams(window.location.search);
        const videoToPlay = urlParams.get('vid');
        const stopBtn = document.getElementById('stopBtn');

        // This runs automatically when the page opens
        if (videoToPlay) {
            database.ref('currentVideo').set(videoToPlay)
                .then(() => {
                    document.getElementById('status').innerText = "Memory activated! Look at the projector.";
                    stopBtn.style.display = "block"; // Shows the stop button
                })
                .catch((error) => {
                    document.getElementById('status').innerText = "Error connecting.";
                });
        } else {
            document.getElementById('status').innerText = "Ready to scan an object.";
        }

        // This runs only when the Stop Button is tapped
        function stopVideo() {
            database.ref('currentVideo').set('blank.mov')
                .then(() => {
                    document.getElementById('status').innerText = "Projection stopped.";
                    stopBtn.style.display = "none"; // Hides the button again
                })
                .catch((error) => {
                    console.error("Error stopping video:", error);
                });
        }
    </script>
</body>
</html>
