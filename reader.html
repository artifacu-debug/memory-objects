<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanning...</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #000; color: white; }
        #status { font-size: 24px; margin-top: 20px; }
    </style>
</head>
<body>
    <h1 id="status">Connecting...</h1>

    <script>
        // This is taken from the FireBase, which helps me make live changes to the site
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
            projectId: "YOUR_PROJECT",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const urlParams = new URLSearchParams(window.location.search);
        const videoToPlay = urlParams.get('vid');

        if (videoToPlay) {

            database.ref('currentVideo').set(videoToPlay)
                .then(() => {
                    document.getElementById('status').innerText = "Memory activated! Look at the projector.";
                })
                .catch((error) => {
                    document.getElementById('status').innerText = "Error connecting.";
                });
        } else {
            document.getElementById('status').innerText = "Ready to scan an object.";
        }
    </script>
</body>
</html>
